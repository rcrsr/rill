# Lefthook git hooks
# Docs: https://lefthook.dev/configuration/
#
# Skip with `LEFTHOOK=0 git <command>` or `git <command> --no-verify`.

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '*.{ts,tsx}'
      run: pnpm exec eslint {staged_files}
    prettier:
      glob: '*.{ts,tsx,js,mjs,cjs,json,yaml,yml}'
      run: pnpm exec prettier --check {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm -r run typecheck
    test:
      run: pnpm -r run test
