# Lefthook git hooks
# Docs: https://lefthook.dev/configuration/
#
# Skip with `LEFTHOOK=0 git <command>` or `git <command> --no-verify`.

pre-commit:
  piped: true
  commands:
    oxfmt:
      priority: 1
      glob: '*.{ts,tsx,js,mjs,cjs,json,yaml,yml}'
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    oxlint:
      priority: 2
      glob: '*.{ts,tsx}'
      run: pnpm exec oxlint --config .oxlintrc.json --fix {staged_files}
      stage_fixed: true
    # Ungated by glob on purpose: it runs in ~30ms, and gating on the arbiter
    # path would miss a commit that edits only the lock.
    language-lock:
      priority: 3
      run: bash scripts/check-test-lock.sh

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm -r run typecheck
    test:
      run: pnpm -r run test
