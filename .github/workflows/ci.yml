name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24', '25']

    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm -r run check

  deps:
    name: Unused deps and exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run knip
        run: pnpm check:deps

      - name: Check formatting
        run: pnpm check:format

  language-lock:
    name: Language arbiter lock
    runs-on: ubuntu-latest
    steps:
      # No fetch-depth: the lock compares against a committed snapshot, not a
      # base ref, so it needs no history and behaves the same on main.
      - uses: actions/checkout@v5

      # Needs git, grep, and sha256sum only. The check job above already runs
      # the suite on 22/24/25, so this never runs it a second time.
      - name: Check language arbiter lock
        run: bash scripts/check-test-lock.sh
