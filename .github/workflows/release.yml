name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack and install pnpm
        run: corepack enable && corepack prepare --activate

      - uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Hugo
        run: |
          HUGO_VERSION="0.152.2"
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin hugo

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version consistency
        run: ./scripts/check-versions.sh

      - name: Build all packages
        run: pnpm -r run build

      - name: Run tests
        run: pnpm -r run test

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/core packages/rill-config packages/cli; do
            dir="${dir%/}"
            [ -f "$dir/package.json" ] || continue
            PRIVATE=$(node -p "require('./$dir/package.json').private || false")
            [ "$PRIVATE" = "true" ] && continue
            NAME=$(node -p "require('./$dir/package.json').name")
            VERSION=$(node -p "require('./$dir/package.json').version")
            if npm view "${NAME}@${VERSION}" version &>/dev/null; then
              echo "Skipping $NAME@$VERSION (already published)"
              continue
            fi
            echo "Publishing $NAME@$VERSION..."
            cd "$dir"
            pnpm publish --access public --no-git-checks
            cd "$GITHUB_WORKSPACE"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "GitHub Release '${{ github.ref_name }}' already exists. Skipping creation."
            exit 0
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
